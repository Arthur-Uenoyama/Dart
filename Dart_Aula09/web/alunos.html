<h2>Cadastro Aluno</h2>
<input id="prontuario" placeholder="Prontuário"><br>
<input id="nome" placeholder="Nome"><br>
<button onclick="salvar()">Salvar</button>
<script>
function salvar() {
  fetch('/aluno', {
    method: 'POST',
    body: JSON.stringify({
      prontuario: prontuario.value,
      nome: nome.value
    })
  });
}
</script>
